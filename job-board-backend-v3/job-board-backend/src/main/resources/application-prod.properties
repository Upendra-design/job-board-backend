# Activated by setting SPRING_PROFILES_ACTIVE=prod (e.g. as a Render environment variable).
# Every value below comes from an environment variable — nothing is hardcoded, and
# nothing here has a fallback default, so the app fails fast at startup if misconfigured
# rather than silently running with insecure or wrong values.

# Works with any standard MySQL host, including Aiven's managed MySQL free tier.
# Aiven requires TLS — sslMode=REQUIRED works with the modern mysql-connector-j driver
# without needing to import Aiven's CA certificate manually.
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?sslMode=REQUIRED&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# "update" is acceptable for an assessment/demo project. For anything longer-lived,
# replace with a migration tool (Flyway or Liquibase) instead of relying on ddl-auto.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# No fallback on purpose — startup fails immediately if JWT_SECRET isn't set,
# instead of running with a guessable default in production.
jwt.secret=${JWT_SECRET}

logging.level.org.hibernate.SQL=WARN
logging.level.com.jobboard.api=INFO
