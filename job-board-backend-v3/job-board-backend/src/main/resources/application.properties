# Common config shared by every profile. Profile-specific values (datasource,
# JWT secret, logging verbosity) live in application-dev.properties / application-prod.properties.

spring.application.name=job-board-api

# Defaults to "dev" so `mvn spring-boot:run` works locally with zero setup.
# Render sets SPRING_PROFILES_ACTIVE=prod as an environment variable — no source change needed.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${PORT:8080}

# --- JPA (profile-agnostic settings only; ddl-auto and datasource are per-profile) ---
spring.jpa.open-in-view=false

# --- CORS ---
# Comma-separated list of allowed frontend origins. Set to your deployed Vercel URL in production.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# --- JWT ---
# jwt.secret has NO default here on purpose for prod safety — application-dev.properties
# supplies a dev-only fallback; application-prod.properties requires JWT_SECRET to be set
# or the app fails fast at startup rather than running with a guessable key.
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# --- Swagger / OpenAPI ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
server.port=8080
# --- Logging ---
logging.level.com.jobboard.api=${APP_LOG_LEVEL:INFO}
