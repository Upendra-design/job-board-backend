services:
  - type: web
    name: job-board-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: APP_CORS_ALLOWED_ORIGINS
        value: http://localhost:5173
        # Update this to your real Vercel URL after the frontend is deployed,
        # e.g. https://your-app.vercel.app
      - key: SPRING_PROFILES_ACTIVE
        value: default
        # Change to "mysql" once you've connected an external MySQL instance,
        # and set DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD accordingly.
